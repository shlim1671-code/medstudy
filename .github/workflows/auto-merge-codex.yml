name: Auto-merge Codex PRs

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    if: contains(github.event.pull_request.head.ref, 'codex/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Attempt merge check
        id: check
        run: |
          git fetch origin main
          if git merge origin/main --no-commit --no-ff 2>/dev/null; then
            echo "clean=true" >> "$GITHUB_OUTPUT"
          else
            echo "clean=false" >> "$GITHUB_OUTPUT"
            git merge --abort
          fi

      - name: Auto-merge if no conflict
        if: steps.check.outputs.clean == 'true'
        run: gh pr merge ${{ github.event.number }} --merge --delete-branch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Comment if conflict
        if: steps.check.outputs.clean == 'false'
        run: |
          gh pr comment ${{ github.event.number }} --body "⚠️ Conflict 발생 — 자동 머지 불가. PR을 close하고 최신 main 기준으로 Codex 태스크를 다시 생성하세요."
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
